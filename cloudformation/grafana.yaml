#yaml-language-server: $schema=https://s3.amazonaws.com/cfn-resource-specifications-us-east-1-prod/schemas/2.15.0/all-spec.json
AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Managed Grafana with SSO Integration

Parameters:
  WorkspaceName:
    Type: String
    Default: my-grafana-workspace

Resources:

  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: grafana-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
        - arn:aws:iam::aws:policy/AmazonPrometheusReadOnlyAccess
        - arn:aws:iam::aws:policy/AWSXrayReadOnlyAccess

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: !Ref WorkspaceName
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaServiceRole.Arn
      DataSources:
        - CLOUDWATCH
        - PROMETHEUS
        - XRAY
      NotificationDestinations:
        - SNS
      PluginAdminEnabled: true

Outputs:
  GrafanaWorkspaceId:
    Value: !Ref GrafanaWorkspace

  GrafanaEndpoint:
    Value: !GetAtt GrafanaWorkspace.Endpoint